<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemal Aksu - 06 BRZ 899</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 85%; max-width: 380px; text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .bmw-logo img { width: 80px; margin-bottom: 15px; }
        .plate {
            background: white; border: 2px solid #000; border-radius: 5px;
            display: inline-flex; align-items: center; margin-bottom: 20px; overflow: hidden;
        }
        .plate-blue { background: #003399; color: white; width: 25px; height: 40px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px; font-size: 10px; font-weight: bold; }
        .plate-number { font-size: 24px; font-weight: 900; padding: 0 10px; color: #000; }
        h1 { margin: 10px 0; font-size: 1.5rem; color: #333; }
        .links { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; text-decoration: none; color: white; font-weight: bold;
            border-radius: 12px; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-call { background: #2ecc71; }
        .btn-insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="container">
        <div class="bmw-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" alt="BMW"></div>
        <div class="plate">
            <div class="plate-blue">TR</div>
            <div class="plate-number">06 BRZ 899</div>
        </div>
        <h1>KEMAL AKSU</h1>
        <div class="links">
            <a href="tel:+905416084427" class="btn btn-call"><i class="fas fa-phone-alt" style="margin-right:10px"></i> Hemen Ara</a>
            <a href="https://instagram.com/kemalaks0" class="btn btn-insta"><i class="fab fa-instagram" style="margin-right:10px"></i> Instagram</a>
        </div>
    </div>
</body>
</html>
