<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemal Aksu - 06 BRZ 899</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Hareketli ve Çok Renkli Arka Plan */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 85%;
            max-width: 380px;
            text-align: center;
            /* Cam Efekti (Glassmorphism) */
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .bmw-logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
        }
        .bmw-logo img { width: 100%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

        /* Türk Plaka Tasarımı */
        .plate {
            background-color: white;
            border: 2px solid #000;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .plate-blue {
            background-color: #003399;
            color: white;
            width: 30px;
            height: 45px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        .plate-number {
            font-size: 30px;
            font-weight: 900;
            padding: 0 15px;
            color: #000;
            letter-spacing: 1px;
        }

        h1 { margin: 10px 0; font-size: 1.8rem; color: #1e272e; font-weight: 800; }
        .subtitle { color: #555; margin-bottom: 30px; font-weight: 500; }

        .links { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 15px;
            transition: 0.4s;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn i { margin-right: 12px; font-size: 1.3rem; }

        /* Buton Renkleri */
        .btn-call { background: linear-gradient(to right, #11998e, #38ef7d); }
        .btn-insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="bmw-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" alt="BMW">
    </div>

    <div class="plate">
        <div class="plate-blue">TR</div>
        <div class="plate-number">06 BRZ 899</div>
    </div>
    
    <h1>KEMAL AKSU</h1>
    <p class="subtitle">Araç Sahibi İletişim Hattı</p>

    <div class="links">
        <a href="tel:+905416084427" class="btn btn-call">
            <i class="fas fa-phone-alt"></i> Hemen Ara
        </a>

        <a href="https://instagram.com/kemalaks0" class="btn btn-insta">
            <i class="fab fa-instagram"></i> Instagram: kemalaks0
        </a>
    </div>
</div>

</body>
</html>
